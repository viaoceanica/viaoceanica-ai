###############################################################################
# Via Oceânica AI Platform — Docker Compose
#
# Architecture:
#   nginx (80/443) → gateway (3000) → platform-core (4000)
#                                    → ai-service (4010)
#                                    → billing (4020)
#                                    → mod-restauracao (4001)
#                                    → mod-gestao-email (4002)
#   shell (3001) — frontend SPA (served by nginx in production)
#
# External dependencies:
#   - PostgreSQL (Supabase) — platform_db
#   - Redis (local container) — session cache, rate limiting
#
# Usage:
#   docker compose up -d                  # Start all services
#   docker compose up gateway shell       # Start only gateway + shell (dev)
#   docker compose logs -f gateway        # Follow gateway logs
###############################################################################

version: "3.9"

x-common-env: &common-env
  NODE_ENV: production
  JWT_SECRET: ${JWT_SECRET}
  COOKIE_NAME: app_session_id
  REDIS_URL: redis://redis:6379

services:
  # ─── Redis ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Gateway ─────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      <<: *common-env
      GATEWAY_PORT: "3000"
      PLATFORM_CORE_URL: http://platform-core:4000
      AI_SERVICE_URL: http://ai-service:4010
      BILLING_SERVICE_URL: http://billing:4020
      SHELL_URL: http://shell:3001
      MOD_RESTAURACAO_URL: http://mod-restauracao:4001
      MOD_GESTAO_EMAIL_URL: http://mod-gestao-email:4002
    depends_on:
      redis:
        condition: service_healthy
      platform-core:
        condition: service_started
      shell:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Platform Core ──────────────────────────────────────────────────
  platform-core:
    build:
      context: ./services/platform-core
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      PLATFORM_CORE_PORT: "4000"
      DATABASE_URL: ${PLATFORM_DB_URL}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── AI Service ────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      AI_SERVICE_PORT: "4010"
      AI_PROVIDER_API_KEY: ${AI_PROVIDER_API_KEY}
      AI_PROVIDER_BASE_URL: ${AI_PROVIDER_BASE_URL:-https://api.openai.com/v1}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4010/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Billing Service ──────────────────────────────────────────────
  billing:
    build:
      context: ./services/billing
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      BILLING_PORT: "4020"
      DATABASE_URL: ${BILLING_DB_URL:-${PLATFORM_DB_URL}}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4020/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Shell (Frontend SPA) ─────────────────────────────────────────
  shell:
    build:
      context: ./shell
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ""
      VITE_APP_TITLE: "Via Oceânica AI"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Module: Restauração ──────────────────────────────────────────
  mod-restauracao:
    build:
      context: ./modules/restauracao
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      MOD_RESTAURACAO_PORT: "4001"
      DATABASE_URL: ${RESTAURACAO_DB_URL:-${PLATFORM_DB_URL}}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Module: Gestão Email ─────────────────────────────────────────
  mod-gestao-email:
    build:
      context: ./modules/gestao-email
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      MOD_GESTAO_EMAIL_PORT: "4002"
      DATABASE_URL: ${GESTAO_EMAIL_DB_URL:-${PLATFORM_DB_URL}}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Nginx (Reverse Proxy — Production) ───────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      gateway:
        condition: service_healthy
    profiles:
      - production

volumes:
  redis-data:
